<svg width="1000" height="220" viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0d1117"/>
    <stop offset="100%" stop-color="#151b23"/>
  </linearGradient>
  <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
    <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#1c2128" stroke-width="1"/>
  </pattern>
</defs>

<rect width="1000" height="220" rx="12" fill="url(#bg)"/>
<rect width="1000" height="220" rx="12" fill="url(#grid)" opacity="0.6"/>
<rect x="0.5" y="0.5" width="999" height="219" rx="12" fill="none" stroke="#30363d"/>

<rect x="0" y="0" width="4" height="220" fill="#58a6ff"/>

<text x="48" y="70" font-family="Consolas,'Courier New',monospace" font-size="32" fill="#e6edf3" font-weight="600">Pratik Raj</text>
<text x="48" y="98" font-family="Consolas,'Courier New',monospace" font-size="15" fill="#7d8590">Cloud Architect &#183; Backend Engineer &#183; Full-Stack Developer</text>

<rect x="48" y="112" width="0" height="2" fill="#58a6ff">
  <animate attributeName="width" values="0;420;420" keyTimes="0;0.6;1" dur="2s" fill="freeze"/>
</rect>

<text x="48" y="142" font-family="Consolas,monospace" font-size="13" fill="#6e7681">Final-year CS @ MIT ADT University, Pune &#8226; Building scalable cloud-native systems</text>

<!-- stat chips -->
<g font-family="Consolas,monospace" font-size="12">
  <rect x="48" y="160" width="150" height="34" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="62" y="181" fill="#58a6ff" font-weight="600">500+</text>
  <text x="100" y="181" fill="#8b949e">day LeetCode streak</text>

  <rect x="210" y="160" width="120" height="34" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="224" y="181" fill="#3fb950" font-weight="600">Java</text>
  <text x="262" y="181" fill="#8b949e">/ Spring</text>

  <rect x="342" y="160" width="120" height="34" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="356" y="181" fill="#d29922" font-weight="600">AWS</text>
  <text x="392" y="181" fill="#8b949e">cloud</text>
</g>

<!-- right side minimal mark -->
<g transform="translate(880,40)" opacity="0.5">
  <rect x="0" y="0" width="70" height="70" rx="10" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <text x="35" y="44" text-anchor="middle" font-family="Consolas,monospace" font-size="22" fill="#58a6ff" font-weight="700">PR</text>
</g>
</svg>
